name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Fail the build on any compiler warning so we don't accumulate cruft.
  RUSTFLAGS: -D warnings

jobs:
  core:
    name: core · fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (core only — desktop runs in its own job)
        run: cargo clippy -p sangam-core --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test -p sangam-core --all-targets --locked --verbose

      - name: Build (release, core only)
        run: cargo build -p sangam-core --release --locked

  desktop:
    name: desktop · build (Tauri)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Build frontend (so tauri::generate_context! finds dist/)
        working-directory: apps/desktop
        run: npm run build

      - name: Clippy (desktop)
        run: cargo clippy -p sangam-desktop --all-targets --locked -- -D warnings

      - name: Build desktop crate
        run: cargo build -p sangam-desktop --release --locked
